body:
  text: 參學門人宏怤編住蘄州菩提禪寺語録順治己丑七月師在廣濟接引菴受請拈張高衆護法疏見麼遍界不曾藏今朝重指注便解承當還較些子如或未然且付維那宣讀入院至山門師卓拄杖云入門一步智者知歸掉臂便行人天罔措且道畢竟如何喝一喝佛殿權掛垢衣云是佛卻披珍御復名誰當陽注破無多子三拜渾同古佛儀高著眼莫狐疑四山驅緑擁禪扉分明月在梅華上看到梅華早已遲展坐具三拜祖師兩兩三三起禍殃鐵釘炊飯要人嘗和贓捉敗菩提寺覿面無私一炷香伽藍兵荒接踵幾經年賴爾靈光寺巋然今日我來重著楔塵塵剎剎一光拳開山醫祖像東也撞著箇漢西也撞著箇漢誰知下載清風兒孫卻得一半且道那一半作麼生暫時放在暗窗前明日與君重計算據室小小方丈無勞伎倆是佛是魔雙收雙放堂堂坐斷地天先笑看華鯨來入網拈護法疏達磨鼻孔夫子眼睛俱在者裏和盤托出還有委悉得者麼如無不免煩他維那宣讀一過舉法衣云從上老古錐遺下者具皮毛後代兒孫透到臨末稍頭箇箇少者一杓惡水不得今朝解脫不下看看山僧入者蟲豸去也搭衣云不入驚人浪難逢稱意魚指法座云大衆會麼者箇寶華王座常在諸人頂𩕳上安著不寬不狹無缺無餘汝等諸人要推推不開要上上不得何不直下與麼去如或未能山僧為你拈卻便升拈香祝聖訖復拈香云生平扶弱不扶強不涉恩讎獨主張雪老冰枯紅焰發一爐香散海雲忙奉為磬山第二代松際先師授和尚爇向爐中從教炙地熏天去也斂衣就座維那白椎云法筵龍象衆當觀第一義喝一喝云直饒向未舉椎前薦取將去早已落二落三了也且第一義畢竟如何莫有道得者麼僧問昔日靈鷲今日菩提未審是同是別師云一不成二不是進云恁麼則靈山一會不異今朝師云卜不習吉進云謝和尚指示師便打問馬祖三十年不少鹽醬未審和尚今日事作麼生師打云當爐不避火進云恁麼則大抵還他肌骨好不風流處也風流師云那裏學者虛頭來進云和尚恁麼那師打云前言不應後語乃掉拂子云堂堂無一物箇箇是菩提擬欲求玄旨依然涉路岐所以教中道一切衆生即菩提相不可以菩提而得菩提又云十方諸佛不得菩提六道衆生不失菩提如是則盡十方界都在諸人菩提裏盡十方世界是諸人一箇本身十方諸佛出現於世轉法輪度群有入涅槃一切衆生流轉生死受無量身經無量劫總不出諸人本身三昧何不直下與麼去豈不省力還有信得及者麼直饒你向者裏信得及去山僧更要問你盡十方世界既是諸人一箇全身為什麼居者不知行者事人間不聽上天鐘到遮裏須知有透脫一路始得如或不然縱使問一答十問十答百總在燈影中行相似若要親證自己菩提本身何異認驢鞍橋作阿爺下頷者哉秪如山僧今日承衆護法之請一行人衆同到菩提鼓響鐘鳴人來客往喫茶敘話循禮循儀開示升堂當機問答且道是親證耶非親證耶若向者裏瞥地去便可上與十方諸佛同一慈力下與六道衆生同一悲仰還會麼衆生即是菩提相杪秋風日殊清亮卜方世界是全身人人腳底重千斤句下若能親薦得山層層又水層層復舉保壽開堂三聖推出一僧壽便打聖云你恁麼為人不惟瞎卻者僧眼瞎卻鎮州一城人眼去在壽擲下拄杖歸方丈者一則話叢林往往拈提盡道三聖保壽共出隻手扶豎臨濟門風恁麼商量何殊矮子看戲殊不知二大老弄巧成拙敗闕愈多山僧今日拄杖開封還有共出隻手扶豎磬山門風者麼如無山僧不免為衆竭力去也卓拄杖喝一喝下座安職事上堂四祖縫衣後靈蹤護有神道場千古舊法席幾番新愧我非時出諸賢共挽臨今朝安職事位位信天真且道作麼生是天真底消息聻良久云釋迦坐禪彌勒煮飯觀音種菜普賢搬柴只有憍陳如尊者冷冰冰地長年打坐山僧看見便去罵他今日安衆職事了也你為什麼不去隨衆作務他道和尚曾作箇什麼來山僧被他一拶直得無言可對無理可伸一場懡㦬而回只得告訴大衆知有恁麼事且道知底事又作麼生擊拂子云諸佛菩薩耐煩耐煩珍重珍重結制上堂掉拂子云不借無生國何須向上機即今一句堂堂光燦爛瓦解冰消萬劫疑不住見聞之內全超鑑覺之淵若是天外出頭底衲子向未舉已前撒手便行豈不成大丈夫哉如或未然有疑請問僧問當今宗旨建立之初請問和尚如何是奪人不奪境師云巢知風穴知雨如何是奪境不奪人師云驚衣雖脫了鵫鴩尚矜誇如何是人境兩俱奪師云花須連夜發莫待曉風吹如何是人境俱不奪師云海闊從魚躍天空任鳥飛進云四句已蒙師指示直截根源事若何師便打乃云霜林葉落體露千山本來面目無藏處三世如來口嘴乾便恁麼去猶涉途程總不如何墮坑落塹山僧今日為汝諸人放一線道直教箇箇如獅子兒壁立千仞去也卓拄杖喝一喝上堂教中道自心取自心非幻成幻法不取無非幻非幻尚不生幻法云何立如幻三昧王彈指超無學此阿毗達磨十方薄伽梵一路涅槃門拈拄杖云恁麼會去彈指超無學橫置拄杖云恁麼會去停四長智養病喪軀復卓拄杖喝一喝云這段葛藤貶向什麼處去也良久云神龍一舉透無邊纖鱗猶在泥中躍下座上堂月月有箇初一諸人那箇不識雖然亙古亙今未免有虛有實還有知虛識實者麼問答竟乃云三世諸佛證不到歷代祖師說不及作善便生樂方作惡還沉苦地娑婆世界斗量來秪得三千一百斛憑中賣與阿修羅十貫銅錢猶不足告汝大衆此事不可使外人知外人知道將謂山僧既稱一方善知識為什麼將大斗量常住東西私下出賣良久云山僧有箇道理回復他且道是什麼道理喝一喝下座上堂僧問把住乾坤失色放行瓦礫生光即今正令全提誰是當其鋒者師云高著眼進云恁麼則直下知歸去也師云對面三千里進云向上事還許學人露箇消息也無師云你試道看進云野色更無山隔斷師云鳥棲林麓易人出是非難僧禮拜問萬機休罷時如何師云莫辜負你者一問進云恁麼則直下擔荷去也師云你又辜負我作麼僧擬開口師便打進云某甲到遮裏箭盡弓折了也乞和尚慈悲示箇安樂法門師打云者納敗闕漢不打更待何時乃豎拂子云大衆見麼所以道欲明向上事須是向上人若毸毸地則不得也直下便見更無回互才涉思惟劍去久矣何況踏步向前問禪問道穿鑿商量挑著屎擔傍家走喚作參禪學道闖入邪魔隊裏被瞎眼阿師將丈二釘八尺楔釘卻眼睛彼此歡喜喚作逼拶工夫付衣付拂奸心詭計正眼看來如糞坑蛆蟲相似汝等諸人大開了眼看看是箇什麼道理直下更無第二人天堂地獄餓鬼畜生菩提涅槃盡是汝諸人日用經歷底步步過無量無邊世界皆是諸人分上事秪為不見有一毫異法故有如是大用若約衲僧門下猶是小用且道如何是大用聻意氣不從天地得英雄豈逐四時推喝一喝下座冬至上堂陽極則陰生陰極則陽至陰陽不到時萬化由茲起所以道一句通同十方快暢起也海晏河清住也乾坤失色且如不去不來不起不住時又作麼生行履聻諸人還委悉麼良久云如或未然更為注破一九與二九相逢不出手還較些子三九二十七凍得虛空成鐵壁四九三十六畫蛇切忌重添足五九四十五陽氣發時無硬所諸人莫謂冷全消更有春寒四十五直待九九八十一恭喜諸人大事畢回頭更擬問如何獦蚤蚊蟲劈嘴擲喝一喝臘月初一上堂卓拄杖云戒由心生心依戒起了得自心無事不畢長安甚鬧我國晏然高氏沙彌舌頭拖地但得心安處處安觸目無非波羅密要了生死根源記取臘月初一上堂僧問德山入門便棒臨濟入門便喝未審還有為人處也無師云急走急走僧云走後如何師打云病鳥不離窠內死僧喝師又打乃云德山入門便棒臨濟入門便喝總是鹽湯止渴無風匝匝之波撩起便行還較些子若是困魚止濼病鳥棲蘆翻成禍事菩提門下總不與麼人情若好喫水也肥汝等諸人還知渾身坐在水裏麼拈拄杖下座打散云選佛若無如是眼宗風那得到于今授比丘戒上堂橫按拄杖云佛殿出家天地前山門鐘鼓皆稽首草木叢林尊證師羯磨教授南北斗今朝特地為舉揚堅持此戒甚希有萬機休罷急須行眼底有華不唧溜人人本具悉周圓一亙晴空無量壽情與無情度盡時淨戒於焉始成就卓拄杖喝一喝臘八上堂拈香竟乃云今朝乃是釋迦世尊成道之辰汝等還見世尊面孔麼拈拄杖卓一下呈起云釋迦世尊來也他道奇哉一切衆生具有如來智慧德相但以妄想執著而不能證得不證得且置作麼生是如來智慧德相聻大衆釋迦世尊被山僧一拶直得無言可對無理可伸山僧不覺呵呵大笑汝等還知有遮箇事也無若知不俟更舉若也不知山僧為汝重加注腳乃卓拄杖數下云如是知如是見如是信解不生法相且宿草菴寶所在近喝一喝下座一歲旦上堂僧問豁開戶牖萬里不掛片雲杲日騰空四顧松風滿座新年頭佛法則不問如何是梅華一點的消息師云三日後看取進云當初迦葉曾注破一笑陽春遍九垓師打云遮場禍事天來大僧禮拜師乃云有物先天地無形本寂寥能為萬象主不逐四時雕傅大士恁麼說話美則美矣未盡善也山僧亦有一頌舉似諸人爆竹一聲催臘去梅華幾點送春回禪和拍掌呵呵笑大地含生脫陰胎大衆看看釋迦老子騎佛殿越山門來拜年也下座解制上堂一期結卻布袋口露地白牛變作狗拆卻牛欄在此時當陽突出看哮吼還有哮吼底麼僧問世出世間是箇大爐韛和尚今日制作麼生解師云火盡不添柴進云畢竟向什麼處安身立命師云無入不自得進云恁麼則佛祖位中留不住煙霞依舊繞青山師云八華絿子上不用繡紅旗進云且喜露柱燈籠證盟去也師便打乃云即此見聞非見開無餘聲色可呈君箇中若了無難事體用何妨分不分即今打鼓升堂四衆雲集方丈老漢口吧吧地說長道短且道是聲色不是聲色是見聞不是見聞即今萬象摐然音聲歷歷又如何得銷繳去到者裏若未透脫綱宗底二六時中觸境逢緣不是隨聲逐色定然愛靜惡喧有見聞作一邊無見聞作一邊心境紛紜識情擾擾如何得了生死去若能即此見聞之中而見聞所不能到居塵勞之地而塵勞所不能侵亙古亙今了無聲色堂堂坐斷見聞念念全超向背解制結制是什麼熱碗鳴聲雖然如是自救則得若要開鑿人天眼日提持向上宗乘更須揚卻全身向那邊更那邊翻箇筋斗再來菩提手中喫棒且道既到恁麼田地為什麼還要喫棒聻平蕪盡處是青山行人更在青山外卓拄杖喝一喝下座上堂覿面分明猶為客作回光歇念籓內羝羊一色千差動靜無住言思不及處別有一壺天作麼生是言思不及底道理還有具爍迦羅眼者麼豎拂子云山僧今日可謂正直捨方便但說無上道如轉輪聖王解開髻中明珠等施諸人若能向者裏大開了眼頓入大安樂法門豈不快暢平生雖然如是能有幾人得到與麼田地蓋緣山僧遮裏無絲毫異路與人行無半句語言與人坐諸方學得的解得的盡是明窗下安排印板上露布泥牛木馬石女金鐘覿面全提懸崖撒手死言死語築滿肚皮乍到山僧遮裏不知是何說話茫無措手真可憐生所以道觸目堂堂頭頭具足向遮裏悟得個無相無名本來無事正是箇大屎坑多少人向遮裏出頭不得橫著肚腸舒機發用明朝後日踏翻來路方知慚愧殺人直饒道了了靈知知亦不立根塵迥脫照體自如雖云成等正覺向上行履若約衲僧門下猶是貼肉汗衫也須脫得乾淨再來山僧手裏請棒喫喝一喝結制上堂僧問即今正在已結未結之際初機罔知適從求和尚指示箇入路師云莫作夢進云點石化為金玉易勸人除卻是非難師云伐冰之家不畜牛羊進云謝和尚答話師便打問萬法從心生諸緣唯性曉本無迷悟人秪要今時了今時了後如何師云依稀似佛鹵莽為僧進云正當與麼時還是已結制未結制師云若是鳳凰兒終不踐生草進云謝師指示師打云一條紅線手中牽乃呈拄杖云大衆見麼十方三世一切剎土中若聖若凡一齊在山僧拄杖頭上成等正覺轉大法輪各各遍入微塵國土一一國土中各各見有雲外比丘統領佛剎微塵數菩薩摩訶薩衆於紫雲峰頂演說如是甚深般若波羅密窮未來際無有間斷身語意業無有疲厭若能如是見得各各具足各各圓滿各各解脫各各成現不資一法不缺一毫長期短期結制解制是甚麼熱碗鳴聲如或未然也須真參實悟一番始得不見古人道毫釐繫念三途業因瞥爾情生萬劫羈鎖直饒纖念不起猶為死水生蟲無端依戶傍門未免墮坑落塹直須捏死猢猻髑髏前更無魍魎拈來便用臨機處殺活縱橫大家自在逍遙擲下拄杖云一任拋來擲去喝一喝上堂眼若不睡諸夢自除心若不異萬法一如終日在世間塵塵無一事何須說離說即說妙說玄雖然如是既到恁麼田地直須努力向前不可優游小徑所以道日可冷月可熱火星燒著梵王衣卻是新羅人打鐵語不到處問答縱橫思不及時千酬萬應更有一言全舉似歸堂止靜對跏趺上堂僧問古人道離心意識參絶聖凡路學只如心意識作麼生離師云一座才起大地全收進云畢竟如何保任師云十二處亡間影響三千界放淨光明進云通身無罣礙處處絶行蹤師云德山元是老婆兒進云某甲總不會師打云你且喫棒著乃舉昔日法眼禪師道眼中無色識識中無色眼眼識二俱無云何令見色師云與麼話墮阿師何異稚兒弄影明頭合處暗裏全彰象王行時狐蹤絶跡十字街頭跛鱉盲龜千金不換一枚鎮海明珠一文錢賣卻七八十顆不為分外遮裏若作佛法商量更須買草鞋行腳始得不作佛法商量帶纍山僧也是箇瞎漢山僧六十年前有箇超諸方便句子今日布施諸人且道是什麼句子聻擊拂子云達磨大師無當門齒下座上堂師舉金剛經爾時世尊至實無衆生得滅度者乃豎拂子云世尊一條生鐵脊梁壁立千仞才被須菩提輕輕磕著便向草裏輥將去雖然如是可謂入水見長人也當時若只向應如是住如是降伏其心處便休今時承虛接響漢向什麼處摸索若是山僧則不然見他道唯然世尊願樂欲聞便云穿卻了也復豎拂子顧大衆云還見世尊麼良久喝云若向遮裏了徹將去一大藏教當下圓成如或未然且行羅漢慈解結縛故行如來慈度衆生故喝一喝上堂實際理地不受一塵靈光獨耀無古無今佛事門頭不缺一法直撞橫沖七通八達兩行滯貨一齊收千林萬壑冷湫湫落日紅霞千嶂錦西風黃葉一聲鳩卓拄杖喝一喝結制上堂橫按拄杖云汝等聞有箇雲外長老出世各各頂笠腰包來到遮裏參禪學道擬會西來大意錯了也殊不知山僧從無量劫來常在你頂門打坐寸步不離你要見則得欲覓則不得你擬向玄妙處覓山僧山僧不在玄妙處你向平常處覓山僧山僧不在平常處你向了不可得處覓山僧山僧不在了不可得處你向一切處見山僧山僧不在一切處你若見得山僧與山僧孝順山僧與你永出塵勞高超十地舉心動念皆成海印發光語默坐行盡是超佛越祖你若不見山僧面忤逆山僧時山僧使你欲暫舉心塵勞先起昏沉散亂卜度思惟向外馳求自纏自縛且道山僧既在你頂門打坐歷劫不離為什麼升沉各別還有透得此意者麼良久云山僧即是你你即是山僧雖然如是諸方唱導門中即得若向菩提門下更須將自己與山僧一齊拋向東洋大海轉身向那邊更那邊打箇筋斗卻來菩提手裏請棒喫且道既是一齊拋了又將什麼喫棒還會麼拈拄杖卓一下喝一喝云不容擬議斬全身始得名為主中主上堂此事無你解會處無你參尋處無你思惟處你要悟即得要會即不得若是箇真實悟得的人如鄉里兩人說家常話相似了了明明成成現現問東答東問西答西不承言不滯句傍人觀之或驚或愕或想或疑將謂有許多玄妙機鋒道理殊不知在他分中有什麼禪道機鋒可說雖然如是直饒與麼會處猶隔山僧三十里在卓拄杖云描也描不成畫也畫不就直下相逢來一槌俱打透復拈拄杖卓一下云將在軍君命有所不受解制上堂肘後懸符底且過一邊氣吞佛祖底猶居門外直得海底生塵山頭鼓浪猶是無風匝匝之波若論向上提持直饒百千諸佛展無盡神通歷代祖師弄無盡伎倆向此箇門中如雪填井相似還會麼擊拂子云不是與人難共住大都緇素要分明上堂舉華嚴經云隨順無明起諸有若不隨順諸有斷諸有既盡十方凡聖只可填溝塞壑到遮裏上無攀仰下絶己躬猶是無風匝匝之波還有跳得出者麼良久云跳則且置只如既是上無攀仰下絶己躬又喚什麼作無風匝匝之波聻擊香几云披簑側立千峰外引水澆蔬五老前上堂僧問銀牆鐵壁時如何是迷中悟師云你問遮箇繫驢橛作麼進云瓦解冰消後如何是悟中迷師云劍去久矣你方刻舟問學人生死不明乞師一接師云莫妄想進云不會師云卻較些子僧禮拜師便打乃云聰明不了生死乾慧難脫苦輪若不真參實悟打脫業識根由總無自由分汝等無論久參初學皆須單刀直入掃蕩攙搶方見太平基業若只向心窩裏想本子上尋以當參學正如南行北轍愈行愈遠生死到來方知不實近時有一等禪和子不信真參實究不是向見聞知覺上認住便是向無為無事內困著甚至慣習機鋒胡談亂作種種邪謬病僧久病無力又舌頭生瘡不能一一詳舉所以真實告報諸人道見聞知覺決定不是行住坐臥決定不是坐禪入定決定不是寒向火熱乘涼看孔著楔捨短從長菩提寺裏一百五十箇禪和子一百四十九箇沒有鼻孔衆中忽有箇漢走出來道請問和尚那一箇畢竟是甚麼人病僧到遮裏怎得不打還有知落處者麼乃擊香几云好大哥歸堂去冬至上堂一毫端現寶王剎破院子等地天寬寒向火熱乘涼門前山色鬱蒼蒼搬磚弄木權相為更無佛法可商量諸仁者莫倉皇不了流為聲色夢了則全身入帝鄉豎拂子云且道是聲色耶是帝鄉耶滿盤托出無人委七寶空餘萬丈光復舉五祖演冬至小參舉傅大士偈云有物先天地無形本寂寥能為萬象主不逐四時雕祖云傅大士恁麼說話可謂精金美玉今古光輝山僧舉到遮裏忍俊不禁與諸人頌出頌云有中有無中無細中細粗中粗師云諸大衆要見傅大士則易要見演祖則難何以故話在菩提舉到者裏也不妨與箇注腳袖頭打領腋下剜襟貧人齊奪卻富者與三斤當山遠菴和尚捐資刻前住神鼎雲外和尚語録第一卷康熙乙巳夏月神鼎塔院識
