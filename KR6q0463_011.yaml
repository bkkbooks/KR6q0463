body:
  text: 侍者深知編偈閱法華經作偈七首贈法師眉光普現塵沙界今古全彰頃刻時權掛垢衣來作佛卻披珍御復名誰三車出宅群兒喜一色機忘我獨知法法從來皆實相何勞更舉轢中泥道場一坐經十劫聊為時人示病因抖盡許多閒骨董依然覿面隔途程授記將來作佛陀聲聞努力脫沉痾鼻頭捏轉呵呵笑燕語鶯啼不較多一乘寶所惟云近纔涉名模便隔多信腳蹋翻清冷窟等閑不奈寶珍何伶俜除糞幾多年寶藏無求忽現前若解全家俱撇撒拈來土塊勝人天十方世界身中現情與無情嘹亂歌寶塔淨空連湧地眾生無奈自疑何閱楞嚴經成偈十首贈某法師七處窮心慈大切阿難何事更煩功饒他頭動見無動未免朦朧在夢中不生滅性管窺天鏡裏尋頭豈偶然驀地喚回顛倒夢由來成佛我為先八種俱還爾是誰傾腸倒腹為伊推只因心見綿纏甚依舊渾身墮水泥不歷僧祇獲法身夢中有語未惺惺剎竿倒卻重加楔三世如來一口吞寶光互涉莫生疑眉橫目上許誰知雪消春到天然煖把手牽他不肯歸三十二身風過樹十四無畏月行空野老不知堯舜力村歌社舞鬧兒童依三明誨斷三因大地山河盡陸沉條令斬新重布出憑空玅手繪麒麟多般戲論俱消滅六根五陰本來空阿難從此拋身命日落西方又起東昏沉妄想百千多五十聊宣陰境魔魔佛任他虛起滅山高不礙白雲過法從緣起本無生迷悟由來但強名夢裏古今高突岏醒時依舊坦然平住山十警策偈生死事大切莫因循寸陰虛度業海浮沉正依報定不必勞思暫時失念緣差悔遲意將散動即當攝還塵勞海闊一吸即乾古德住山食纔接氣四事虛消寧不深媿既身且食乃圃乃樵為爾發機三乘以超不作不食古有明訓爾我諸人敢不自奮本覺靈明人人圓具智鑑暫昏便落緣慮空華萬像瞪目成狂識情不動般若斯彰妄覺妄知害道之要剎那失時即非靈玅名相無體唯念是依射虎中石心未生疑閱朝宗和尚指迷錄有感寥寥衰法不堪論俗惡猥邪滿世生三刻指迷功不朽豈同蝗蠈競兒孫示禪人四賓主話禪人遠至自江西入門便乃呈全提綠水青山仍舊是惺者自惺迷者迷迷不著悟不著快鷂不打籬邊雀浮雲散盡碧天涼楚水吳山道路長賓主歷然休再舉黃鶯啼在深深樹臨濟沒經幾許年水底分明別有天今朝索我重饒舌大鵬飛入蝸牛睫縱然句下便翻身也是將龜喚作鱉侍者歸鄉省親乞法語當年演祖老婆心參得禪稱侍者勤今古雖然同一道山僧不弄遮驢唇時當孟夏初炎日萬木森森聳翠陰野水護田釀嫩綠碧雲拖練過高岑天真消息無人會書送汝歸意便惇省親侍祖佳題目切忌於茲便躲跟勘破娘生真面目速來劍刃再翻身再翻身休說夢王婆元是張朝奉門門境界縱知歸依然未達吾家用眼裏瞳人尺八吹湧遍湧兮等遍湧惺寂師弟四旬初度以歌贈之三千里外來相訪一句轟開銕面門拈起毛端成劍戟重加鍼拶汗如淋如淋汗下通身快喪盡多年間買賣渺視承虛海蠡禪出頭天外來還債債負聊還老佛陀幻逢初度且高歌斷碑風雨文章碎古寺門庭貫薜蘿此語拈來人共睹當念誰能罷歌舞千劫分明句裏呈眉毛眨上無尋處又送返姑蘇五年聚首難忘念一偈分攜不忍言此日為公重叮囑三吳好處莫廉纖主賓忘盡始相知同生同死也大奇多少遊人覓交誼誰知汝我了無機靈木出院復來求住以偈示之三頓不能知死活更干何處脫根塵他年冷地重知痛卻恨阿師手太輕為筏巨濟沙彌剃髮示語老年千里來相訪為慕吾宗岐徑深無見頂𩕳全體露也須這裏脫根塵付衣缽偈三衣一缽付汝行持說禪說律笑破唇皮示匪一禪人匪一出紙求法語我倦令參自己去更問如何與若何當頭一棒無藏處果能直下便忘情南山起雲北山雨若還不了此根源將謂吾猶隱乎爾咄示霞石法偈世外煙霞到者稀此懷誰許悟人知山自是山水自水莫須移易一毫釐倒駕慈航潑面來千門萬戶盡撞開笑他枯坐忘朝暮湛湛澄澄似劫灰示曇印法語十方諸佛同一舌縱橫玅用熾然說言滿虛空無點塵指歸惟在箇時節譬如月入眾波中其光無異亦無同北俱盧洲燒火向大洋海底煖烘烘無二無斷智清淨凡愚不了徒增悶赤手全提殺活機有法與人真戲論問禪問道虛空安柄自法自知再喫三頓示禪人開口打不開口打是非迷悟一齊捨直饒如此徹根源三十藤條猶不假不假借意如何信手揮毫不較多魔佛任他閒起滅山高豈礙白雲過煙雲說法山河聽萬象森羅遵號令到了依然一事無缽盂何用重安柄七九元來六十三互換家風仔細看驀然蹋斷來時路大千一擲了無難了無難任收放作塊成團難近旁屋裏滿堆萬朵山腳頭頓起千層浪四句鏟百非離張公喫酒李公迷無孔銕鎚當頭擲是聖是凡誰得知祖師未渡流沙河風行水上皺青波九年面壁成何事松陰落落籠山寺大王路上少人行玄途鳥道空崢嶸蝸牛徒云三千界修羅謾比須彌深朅來南北江西東五葉花殘掃地紅嗟哉荊棘多撩亂縱橫狐鼠棲蒿蓬南泉秖道一莖草非短非長非暗早人人觸著通身涼千古萬古誰知好雪公雪公胡為乎端居巖壑延朝晡養成牙爪聞獅吼增其山水一葫蘆咄有句向汝道晴空飛雪雹無句向人言孤船浪裏顛不如直下俱休歇大開兩眼高山眠祖師心印銕牛機紅爐焰上雪花飛擎叉舞笏拖泥水不遇知音徒爾為竹裏風松間月為君掃盡空華屑趙州親見老南泉便是如今箇時節太平歌新豐調家家門外長安道只憑一缽度春秋銕壁銀山俱靠倒更問如何末後言當頭一棒休嫌少索法語甚麼人蟭蟟吞海鶴銕樹舞三春拄杖頭邊草鞋底一聲雷震清風起世出世間無別長都來總是自家當良馬不須鞭影動丈夫豈肯為人忙背觸俱非道一句春風觸著珊瑚樹笑他死捏蛇頭人隊隊因循逐玄路玄路東西處所多將心求悟轉成訛長伸兩腳高山臥冷看烏兔徒奔波太平不若今時好是佛是魔俱靠倒珍重前途訪問人不知銜取一莖草癸未之年春仲月連床夜雨說無說今朝曳杖走天童浪煖龍門擬超越慚予疏懶臥空山滿口無言餞公曰煙雲黯淡柳依依遠近山顏瘦如骨個中消息少人知盡情舉似為公別太白峰頭撒手時千古萬古一條銕我有一句子大地載不起饒君拂袖行早已沾泥水今朝送汝意難書年老心孤路又岐未出門時分付了更加註腳成膠𥻿門前丘隴靈山會屋後鴉巢古道場知識百千同日死剛剛唯我舌生瘡乘機執紙競求禪信手揮毫浪潑天四句明明無一語依然髭長口唇邊風鼓松濤浪潑天明明示汝祖師禪舌頭不動談無歇善惡都來一串穿融禪未見山僧日三十藤條似飽喫如今為甚反不明多由作念貪言義垂問將酬連棒打歷然賓主登時分揮毫落紙重書偈疑殺世間多少人發起大機休愛悟小聖何能及大凡三世十方毛孔裏何為不信自庸酸大藏由來一之字洞山此說非言語闍黎拈出令人看十方剎海毛端舉示張長人君不見虎生三日氣吞牛丈夫豈與凡民儔漫天世網籠不住視其所以觀其由法法從來無定性佛祖垂機救時病長安路在腳頭邊頂眼圓明識邪正古今得道每紛紛居士真誠力自能與其嚼蠟功名也孰若曹溪繼法輪示張玄居往來一載餘終始無二致剛毅具肝腸不忍別余去問我入道門直指是何人小魚吞大海萬里絕煙塵拄杖頭邊艸鞋跟底霹震一聲清風頓起世出世間即此便是萬象歷然吾無隱爾示程上觀念念心心勤檢察莫將思慮雜真知情關未破心多礙理解纔生覺以移鹵莽談禪徒自昧顢頇問道枉愚癡死生大事休輕忽最好光陰是此時寄謝李少參五鹿未曾覿面乃深知想見胸同浩瀚奇政頌已傾天下耳禪心每其野僧期公承願力光臺閣我合蹉跎老澗谿肯憶靈山舊時會焚香相俟莫相辭疑公原是通玄士為導群蒙復現身但信一靈元不昧為民為國總非塵作意忘懷皆有住本光明照智無窮同風千里長相見任運仁慈到處通示毛進士含侯電光影裏露全機水急游魚不可棲驀地喚回顛倒夢淡雲扶月過前溪山僧無語君休辨放下家親便得知腦後拈來當面擲眉毛眨上涉離微參示饒孝廉厥修莫言學道須離世應信真身滿大虛舉步便超千聖外頭頭相遇莫相違示居士劉龍友大地為供太虛作盤一口吞盡剩卻青山萬象森羅齊駭倒文殊忘卻兩三三大則滿十方小則看不見手握須彌椎擊碎虛空面莫謂雲居已有年頂上眉毛常現前拈來試問劉龍友舉頭鷂子過西天咄示居士人人固有通天竅不若都盧放下休捏殺猢猻重喫棒花開枯木有來由拶透當陽箇一著獨露乾坤空索索不須土上更加堆萬里重雲只一突唯心淨土誰不有七七原來四十九報寧寺裏與君逢形像卓朔頭蓬鬆臨岐句子輕拈出靈光灼灼來熏風是不是非不非風流全在一聲雞自是出群獅子子休逐春風趁馬蹄達磨不來東土二祖不往西天世界搓圓捏扁石童舞袖翩翩淡蕩春風舒柳目蚯蚓蝦蟆相對哭明明遍界絕遮攔何必園林芳艸綠吳君吳君會也無祖師門下無玄途直下裂開真面目大千沙界海中鳧十方諸佛同一舌縱橫殺活熾然說言滿虛空無點塵指歸唯在箇時節譬如月入眾波中其光無異亦無同北俱盧洲燒火向大洋海底煖烘烘無二無斷智清淨凡人不了徒增悶佛祖猶為強著名有法與人真戲論見便見知不知綠水青山徹骨提觸目本來無盡藏何須更舉轢中泥轢中泥最深玅六凡四聖俱不要佛法都來彈指間應身千萬誰為造時時示人人不知吾今方便為伊道參猛虎不食陳年肉俊鷹豈打籬邊兔丈夫撒手出乾坤是是非非俱不顧天覆地載成團作塊打破機關塵塵自在拈起也萬類無蹤放下也山河爽快快快快何處清風動天籟甲乙丙丁卯酉子午高麗擊鐘扶桑打鼓手提拍板唱鷓鴣北俱盧洲人作舞身坐龍樓弄月華空玉國內買硃砂古佛放光生意淡卻來塵裏拾魚蝦參本琰道者索我言一字也無那可說指東向道是西方無端弄巧翻成拙拈起葫蘆換卻頭陝府明明灌銕牛各各圓成無欠剩何須更覓水中漚是佛是魔俱掛壁石上蒼苔翠欲流五千四十八百億四天下只須拄杖頭一撥俱銷化硬似銕軟如綿多處減少處添坐斷東西南北管甚天上人間打掃現行搕𢶍萬里秋色娟娟咦你是何人森林霜殺亂蒼紅病葉飄飄淨遠空湖渚縮流零碎寓壟田脫稿高低同良朋訪我挑燈坐一喚當陽天地中放去收來無繫絆四時佳趣自無窮大道堂堂不假持群生不覺謂為離驀然打破閒家具一笑風前是甚時擬將不出以為稀獨善其如法愈微賴有溪長柄杓不妨閑洗是和非脫盡型模與矩規橫吹銕笛自葳蕤十方在掌閒收放驚起扶籬摸壁兒本來光遍恒沙國稍費精神會不得幽鳥喃喃罵落花秋英亂點莓苔色淨土百詠并序禪宗淨土當體無殊認影迷頭是非夢競但請班師振旅自然國泰民安若乃寶翫門岐機辨徒增識浪紜紜自彼法庸何傷每見今時業禪衊淨執淨謗禪競派分波迷源飲水操戈同室足慨良深余猥形窮谷白醭口堆友人無端舉此為問不覺搔著癢處忍俊不禁遂爾傾談達旦次早出紙索題因成偈語若干首以歸之然幸毋索我於名言句義之中也一念彌陀萬念清山河大地盡翻身良醫不用驢馱藥拈得泥團也活人十方淨土一毛端剎剎塵塵海嶽寒萬德尊容何處是滿天晴月響幽湍尋常拈出彌阤佛靠倒東西與南北莫問高低信步行獅兒豈守金毛窟萬象森羅全佛體迴光返照贅疣哉群生枉自癡迷甚不信身盈功德財即今歸去便歸去何須更待佛來迎太平雖是將軍定不許將軍見太平十方佛剎迥難量獨有彌阤願力長萬劫修持真妙士凡夫一念足承當無量壽超三際外極樂塵包法界天珍重慈恩來接引莫將知解自留連索頭撥動慈尊現方信含生本自真不借一毫光燦爛枯禪到此卻沉吟發起大機能念佛鑊湯無地寄寒冰勸伊直下翻身去同室何爭宗教名淨土元從自己生稱名竟不犯途程凡愚不了如來旨覓巧尋奇墮蘊城歇卻馳求佛現前時時法韻鎮常宣娑婆安養印明滅秖在如今指顧邊念佛元非向外尋如來親口為君陳是心是佛是心作徹底無疑幾箇曾未回淨土尚娑婆汩沒塵寰更幾何嚼蠟世緣雖未盡故鄉知路已無多秪由自體本來空四聖六凡不借功六八願嚴微妙國我成佛也亦相同上下中根俱攝入縱橫自在羨能仁饒君徹悟超三際爭似彌阤一句親水清月現非他得地煖華開豈別求經像如如秪這是等閒蹉卻障何休念佛功深障自除故鄉曾不外吾居凡情聖解俱拋卻穩坐蓮華任卷舒佛國無邊樹裏彰都緣慈父行無疆丈夫彼此皆如是便請深心試一場道無道有俱譫語是淨是禪總強各五色命根誰斷得不如依舊度流年樓閣重重盡日開阿誰端坐寶華臺家鄉咫尺無行路金臂遙伸接引來紛紛六賊卒難除趁得東兮又失西六字金剛全殺活太平寰宇斬頑癡莫貪知解枉勞神活佛明明在汝身內外中間無處所彌阤一語震乾坤帝網重重籠寶樹毫光掩映碧琉璃故鄉家業今猶在客作貧兒怎不知從來法法總無蹤徇語依通是啞聾瞥爾回機行易路蝦蟆蚯蚓笑相逢舌覆三千證不虛紫金相好現無餘玄微及盡方知謂蠡管何能推測歟長空鴈過水無痕法爾如然不借因無物卻彰凡聖妙塵塵全露本來身業習全憑一想摧十方元不隔纖埃寶嚴殿閣唯心現彈指生西絕去來六字彌阤勤勇念眉毛撕結未曾問快刀利斧檗難開轉過頭來忘卻面直截根源一句佛未忘心識自遲疑雖然向道離心識又被無心夢裏迷寒林春暖暗抽新念佛功深佛影臨直下不遊差別路渾身大坐法王城功勳不盡不周圓淨土何常世外緣達想木空名解脫全彰福慧利人天寂寞山居一事無梅窗恰好月來初莫將染淨紛心目箇是人間極樂圖明暗全捐正眼開一枝華上一如來凡夫到此皆成聖拍手相逢笑一回淨土一機誰了得目連鶖子也茫然為憐火宅耽玄子沉溺枯禪不計年門門何處不圓通一念歸根萬法融橫截四生三有地盡塵沙界鼓熏風參禪念佛盡由伊一一天真總合宜言句了無交涉事休將學解播唇皮心境由來秖強名莫將知見論無生無生淨處西方路好手憑空畫綵麟一句彌陀纔念了虛空撲落已多時我也不須增註腳大家留取兩莖眉淨土無塵莫妄猜妄猜俱是強馳求何人死得偷心盡就我西方徑路遊萬緣歇去天真佛禪教從來不二門無量剎塵光內現精研一念自知恩本來無悟亦無迷即此迷時是悟時記得前年秋雨夜大風吹折路旁碑見道洞明諸古宿禪宗淨土等弘持斬頭覓活貪奇者焉悟西方格外機盡道唯心成淨土我談淨土不容心有無心土俱拋卻處處蓮華國裏人汝身元是妙摩尼彈指生西有甚奇縱使遍遊華藏海都來不出一毫釐秖這一聲真佛號十方三世寓其中腳跟拶折西方路石女懷胎臉暈紅五濁愛河稱利物自他焉保不隨流大須諦審休輕率順逆昇沉可自由西方咫尺有何難秖在凡夫一念看久久修持全體露如魚飲水孰能瞞百歲光陰眨眼過不回心也更如何饒君富貴兼才德難免無常煞鬼磨本來面目古彌阤覿體全彰莫認差更擬將心求妙悟何殊撥水去尋波水動金渠華正開端然合掌見如來鏗鏘天樂頻伽舞惹得虛空笑滿腮八溟四渤皆歸水一句超然截眾流殺盡英雄人不見何須更覓水中漚胎獄寄身經幾許歸途勇往敢悠悠莫云取捨情猶在獅穴從來不產彪持名方便妙難思凡聖昇沉頃刻時踏得故鄉田地穩十方全現一蓮枝眾生與佛無差別擬議絲毫落正偏掉臂便行全不顧也須喫我大麤拳念佛生西人易會無依無住念為難難易兩頭俱拽斷腳跟依舊不相干情識現為業力繩漫談淨土只唯心葛藤樁子全根拔方見春回萬卉新一句彌阤方舉念蓮花出水已多時明明說與君知否擬議纔生失卻眉良朋索我西方偈黃葉拈來聊贈之細嚼自知滋味別龜毛透出妙蓮池真照不須明日月玅嚴雖具借功成翹勤想念非他事涉入門門眼更清蓮根本向濁泥生即此凡心是聖心遍入十方興佛行由來不出一微塵銀臺金殿影交加處處晴光映寶華家業現成歸便得纔生疑慮隔天涯妄情盡處事多端十字街頭春正闌生死涅槃俱扯斷何方更著聖和凡無念無依出寶蓮閻浮習性自融遷這回永謝空華夢不負披誠數十年滾滾松風幕幕煙共談淨土樂無邊諸佛證成真實語何處西方不現前一句彌阤全體現更嫌何處不風流當機不薦自埋沒枝上生枝卒未休不借一毫勤念佛凡夫須此越迷津娑婆界內人多少幾箇男兒眼有睛濁世眾生信可悲說道人多行道稀曠劫未明端的旨瞞頇亂統罔愚癡我心靈玅現前事佛祖由來有甚傳鞭起銕牛耕大地厭談淨土實堪憐揚眉瞬目早周遮認得根塵豈是耶金鋀現前全不辨光陰虛度亦堪嗟歷歷明明一句佛聖凡何處更容身承當直下猶紆曲那有閒言取次聞信手拈來絕謂言縱橫任運自無痕烹茶供養金剛子飽得山門努力喧念而無念超岐路境念俱無大脫空天樂談經真際事了非對待色聲同塵塵中念彌陀佛箇是亭亭火裏蓮明暗色空俱坐斷纖塵不動利人天曠大劫來真父子往生何處有生名但知自己彌阤父莫問彌阤作麼生轉凡成聖了非難秖句彌陀仔細看看到聖凡情淨處塵塵佛國絕遮攔此身纔滅彼身成箇裏如何有死生但握一枝無孔笛隨方吹出太平音五濁不居安養外西方秪在佛聲中可憐日用不知者剛把黃金博朽銅珠投濁水自然清清水蓮敷四色榮清濁水珠俱撇了都來無物不圓成浩浩佛聲正念時十方諸佛展雙眉是凡是聖俱成佛何事渠渠仍佇思淨心念佛毫無剩堪笑時流枉是非昧卻本頭咬枯骨蝸牛角豎自高旗勿因極樂一枝蓮寶藏家珍盡棄捐破宅雖非凡小事成家猶自隔于天一句全消凡聖功火端焉泊太虛蟲門開大施無違拒把手相牽不肯從眾生元是病中佛佛是眾生病裏醫醫去病除無事事堂堂面目好男兒三際只須一彈指樂邦豈是禁人行擬于斯處存窠窟泥水依然滿路程伐鼓椎鐘念佛時虛空伸手拾須彌權衡不動知多少八兩三錢欠一釐非關成佛如麟角秪為貪求似狗毛瞥爾全身俱坐斷笑看水長聽船高說箇唯心與自性空拳聊引小兒歡東西南北同修短纔犯絲毫早自瞞彌陀佛號淨心持箇是群生大導師句下若能生死絕大千搏取若泥丸但執平常云是道撥求淨土亦愚哉更將古德機緣語玄妙商量誤後來遍界遍空全六字世尊聊爾露家風但看繡出鴛鴦巧誰見金鍼暗度中彼方極樂此娑婆仔細參窮不較多魔佛現前俱不滯許君親見老彌阤倚天長劍一聲佛截斷聖凡生死機古路一條平坦坦又誰去也又誰歸莫謂西方途路遠此中端有古彌阤等閒坐斷千峰月任運全超二見河求生淨土雖非實存念無生更背真縱使心空而及第未忘猶似月重輪一句彌阤一粒珠聲聲自撿莫他圖塵沙念盡誰成佛大地群生自寶蕖取捨未忘華翳目兩忘依舊眼生華不如且作順朱者管取年年喫嫩茄歸元捷徑路無差信步行來有甚遮只為回頭并轉腦蓮池反見墜空華無端病眼見空華切忌從人覓到家撥動金鍼膜翳淨汲泉來煮雨前茶鍼鋒尖上五須彌八萬由旬較恰齊若謂互融無小大開眼堂堂陷水泥偶爾勸君恒念佛山僧不是為人提艸鞋邊有通霄路拄杖橫肩不用疑慧乘傳量碧元如聞雲岩宜默成真覺塵真耆眾師捐財助刻神鼎雲外和尚語錄第十一卷康熙乙巳夏月塔院識
