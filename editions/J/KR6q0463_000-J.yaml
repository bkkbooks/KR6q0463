front:
  text: 神鼎雲外澤禪師語錄序余己卯庚辰間聞雲大師名籍甚及讀金正希先生語錄序推崇不遺餘力心尤慕之浚師往匡廬抵蘄州南屆長沙距吳會三千里竟不得一見越十年師入滅又十六年惺寐禪師以其語錄全帙示余展讀彌日乃知人天佩服非偶然也師少而英俊久參耆宿深有發明入陽山見授和尚機鋒迅疾應對如流陽山云汝進語都筐但桶底未全脫在乃發憤再參忽風動簾幙撲蔌作聲從前玄妙寶重處一齊脫落陽山每加勘驗知其證悟非虛始以衣拂付之住匡廬五乳峰採茶作瓔珞粥終年枯坐一日讀高峰自述悟因遂自計曰彼見演祖贊時已悟到虛空粉碎大地平況如何為雪巖末後一拶卻透不過復力參二載偶因失足墮澗山禽驚起飛鳴一聲不覺徹應透現自是大用靈通縱橫自在主賓玄要左右逢源三主祖席衲子雲從應機接物雷厲風行殺活臨時光明直截使人近傍不得湊泊無繇昔臨濟吹毛石火東山撲倒便休師真不愧祖風矣嗟乎世間賢達皆有悟地但末後一關未能打破終是悟中之迷雖高峰為古佛再來其前段猶不免此況餘人耶師之悟力全在重關更進如與群仙同上雲霄獨能撞開天闕宜其自利利人無不具足所傳語錄頑豔服膺也正希先生曰大師面目定不在語錄中具眼者薦取余曰大師面目何嘗不在語錄中但非具眼者不能薦取耳陽山不妄記莂生平煆煉惟師一人師得法十八年門徒參請嘗千數而終身無所付囑惺寂禪師為同參兄弟不遠三千里往來佐師滅度後結集前後語錄已刻未刻如干卷行於世正法流通惺公力也誦斯錄者其無忘厥功時康熙十一年孟春穀旦雲間王光承槃談撰雲外澤禪師語錄原序神鼎雲外澤禪師語錄序汾陽有三種師子句一曰超宗異目二曰齊眉共躅三曰影響音聞三種之中無論影響音聞為野干倚勢異類無分即使齊眉共躅見與師齊早已滅師半德矣唯夫超宗異目見過于師方堪傳授然自曹溪散席以來歷唐宋元明屈指幾人堪稱此種回翔今古庶幾黃檗大仰德山臨濟洞山巖頭雲門玄沙以至汾陽昭石霜圓五祖演大慧杲應菴華暨近代先師悟老人數十輩而已先師龍吟滄海虎嘯深山一時風雲馳驟非但首下天台席多香象狻猊即出自天童刀尺散而之四方者類皆超師有作如磬山再世雲外澤公其一也公始開發天童繼參陽山得受記莂遂深隱匡廬之巔時中現行流識治以悟力一切併消卻疑高峰有悟後之迷念不去心一日偶采野蔬墮深澗忽山禽飛起大叫一聲不覺泮然冰釋從此全機透脫大用現前盡十方世界大地山河草芥人畜都盧是箇清淨光明遮那妙體窅忘彼此泯絕是非故其引接方來提攜未悟從無住本洞示當人不論初機宿學才跨門來教渠一蹋到底直踐至泰至安之域大休大歇之場然擬莽鹵承當便與深錐痛拶而諸方來者非慧偏識短則半青半黃愍其雜毒入心過由師故復於告香普說時舉當世邪知謬說之師條陳其妄指斥其非反覆萬有餘言而娓娓不休焉於乎默照邪禪誤人尚淺大慧禪師尤且肆口譏訶矧穿鑿邪解之害人至戕慧命忍視其禍延不起而救正之乎公既契悟恢宏抑復三學該鍊昔玄沙說法往往與修多羅吻合所以雪峰稱備頭陀為再來人今公說法提綱固已破除佛祖華擘玄銓矣至若因事對機則又一一從如來性起妙德中拈出雖不攢花簇錦要亦麗日光天寧曰公僅叢林銕舌遠殆幾希禪判官之永明壽乎故予謂磬山門下超宗異目獨公一人夫豈阿其所好哉惜夫法門衰替人之云亡九原如可作微公吾誰與歸康熙八年歲次己酉月維小春弘覺忞老人撰雲外禪師語錄目錄卷之一菩提上堂卷之二老祖上堂卷之三神鼎上堂卷之四普說二卷之五小參卷之六小參卷之七機緣卷之八機緣法語附卷之九拈頌卷之十書問卷之十一偈淨土詠附卷之十二詩卷之十三雜著卷之十四散話卷之十五散話附傳遺囑
