body:
  text: 侍者深極編五言古登老祖雙峰巔復同諸禪者游水口瀑布泉奇勝不減匡廬詩以誌之雙峰赤骨立蒼氣欲摩天夜汗成川澤灌溉萬山田潛尋間道出餘石苦相煎水怒攻其腋格關成囂喧石頑而水冽鼓躍竟奔前縱橫灑銀鍊瀑布九天懸佳景真在茲誰謂廬山泉大觀隨所樂局士羨殘編神鼎開山山水在處佳心空趣乃與動靜發幽光麤人不知處我來神鼎山萬象紛然著舉世逐虛名奇怪爭狂倨篇章堆故言腐語如陳絮吾於萬物和所得皆神御隱顯了無干古今潛一慮可居且便居何必求豐裕一壑數峰雲儘可供朝暮朝暮亦何為不藏亦不露月明天宇清鶴唳松濤護無心可悟迷有甚眾生度觸處洞真源不借閒言句大開太古堂豈在多人聚動靜繫非輕救弊惟此務世及出世間如枝之與樹煙雲蕩空碧眉宇舒晴素晚霽菴前弄月亂雲恃風雨吞我萬山青暮天聊展笑雲遁山還醒月來星與俱飛光到我庭披衣坐其下竹冷光鱗鱗萬里溶溶夜蕭然一箇僧七月望夕步月過山至石鼓峰趺坐神倦不覺假寐覺而歸菴東方白矣因記之浩月浸千山竹響和清溜乘興偶遊行不覺過山岫趺石聽幽松刁刁群籟驟片月立予前孤影隨我後倦來伸腳眠不管蟲和獸夢返覺身寒重露凝襟袖歸菴正解衣東方曦也又快活歌示禪者窮禪和煞快活一室空空胸豁豁客來秪見菴中窮誰知活計如天闊或登高或入草般般應用般般好驢蹄佛手一齊來銕額銅頭俱靠倒苦菜羹大麥粥食飽逍遙手捫腹拖條拄杖恣閒遊信口臨風歌一曲不思前不計後憨著肚皮隨分受無量劫來秖目前癡人枉把雙眉皺不求佛不希祖日用行持無處所搬柴運水露家風作者應知絕回互不談禪不論道兩片臨時胡亂掃昔日扶笻上翠峰今朝醉臥荒煙島笑呵呵好大哥姑姑元是老婆婆一般快活人人有此時不薦將如何山居五言律破菴借便住不用買山錢遠近巒煙接高低松韻聯湖光鎔野外篆靄起籬邊即此是真樂餘吾何慕焉路盡山窮處由來一線通煙霞生足下天地走塵中權小猶難近神仙豈足同為人重指註庭竹舞春風拋卻參玄事茅菴養病身明明雖有我歷歷竟無人庭竹從他老園蔬灌每勤誰能知此意獨有澗流聲曠月無人跡良由艸逕深不能隨俗轍常得坐高岑野陌青黃錯雲山蒼翠侵許多西祖義狼藉滿山林钁山兼種地即此是家風禦冷柴根火避炎澗底松淡泊心逾淨逍遙佛頗同所嗟今古夢英俊枉埋中我心本淨玅何用五家禪且喜辭多事今來樂少緣千山嗟突兀一室鎮安眠擬欲登臨者抬眸路八千當陽明指示菴外事無餘荊棘途窮盡縱橫曠自如山高人跡斷月冷鴈聲初卻笑承風者茫茫問太虛秋老辭林瘦冬初趲夜長遠山方吐白孤榻漸來光杖影窺燈蕭泉聲到耳忘塵塵俱剖露何處著思量寄伊菴師舊隱經年別匡山無恙不予猶思翠壁爾勿厭山丘杞慮憐衰法松吟說隱愁何時峰頂上同看白蘋秋七言律匡山別同參諸友天童社裏舊同參匡頂重逢鬢已班虛己可知珍法義忘懷時共飽煙嵐無羈念念超三際有住塵塵落兩般偶憶春風瓢杖約囑君水牯莫驅攔參玄莫認本來翁箇是權名誘幼童手捏虛空成粉碎目前風物自玲瓏談禪論理珠沉水會旨忘心鳥出籠但請不隨明暗昧何勞著力物西東寄徒靈木去年有客曾知汝說是安居村落間禪道有靈能作偈心情無暇似幽閑機鋒紡作勾緣線棒喝流成應世好聊寄苦言祈汝悟開函一讀涕須潛四言雜詠至寶居懷五眼莫睹渴飲饑餐生殺佛祖菩提本具乃發乃熏漸修頓悟天下太平亙古亙今應用無物忻厭居懷千山突兀法性無生隨緣起滅生死涅槃紅爐點雪意影纔消秤椎落井信手捏空饅頭餬餅有無由心心空境盡倒用橫拈無欠無剩五蘊本空四大非有一喚回頭翻過筋斗法身靈玅自在逍遙任緣成佛不用叨叨存我說法生滅熾然無心對境步步登玄本無有物何假何真厭塵取靜徒困心神觸處洞然可賤可貴只許人參不許人會大道堂堂有無不隔線斷齊休咄哉老賊汝心遍周妄情自小我我所空塵塵皆好鏡中見像像寂形空放開皮肚體露金風捨迷求悟如土易金金土俱捐穩坐家庭性本真靈杳無邊際取捨思惟覓甚屎屁道由心悟行導凡愚回頭築著撒手下驢心境佛魔了無著處捏起毛端雷轟雨注執一非餘箇是蠢漢達本無差一光燦爛波波求道說玅窮玄棄金擔土直待驢年將心除妄止火助薪真空頓悟頭頭普門本無階級登陟徒勞咬人屎橛人我山高汝欲識佛當念即真擬心解會倚戶傍門欲求大道莫戀途程當空便擲豈話疏親潭清月皎隱隱勞神掀翻海嶽華雨繽紛等閑放下括地包天低頭憶念敢保驢年既達此宗了無差互行解相應出必由戶佛生同體功不浪施熾然應用法法無為睹鏡生狂狂消何有一體廓然既安且久靈源常淨對境心空隨機刮判智用靡窮赤手揮拳虛空叫痛流出胸襟喚醒群夢洗盡疑塵廓然歸本利劍斫空誰論益損心為法主無處無方晴天掣電群鴈分行達人大觀混融真假等目生死綽有餘暇鐘敲月冷鐸弄風高曠然無跡理事徒勞身心空寂五陰滔滔拈來放去無作無勞連根斬斷更莫踟躕絲毫繫念騎驢覓驢三毒元空光明洞照本自現成休談玄玅身心若有夢想應實觸處洞然何離何即事事任緣閒行閒坐水上葫蘆撥著便過機輪無滯許汝同參用時滲漏將欲誰瞞山禽奏韻新茗斟嘗十方齊現常寂玅光客到空林清談作供懶下蒲團不迎不送一蒲閒坐脫體全提輕風淡度煙篆橫微捫空尋嚮勸歇翻疑忽然磕著笑破唇皮山來枕上雨到窗前天然富貴可以忘年三間草屋好友能來對床便睡無語如雷客馭風來啜茶度夏開口說禪當頭便罵提壺勸客布穀催耕半春佳景分付誰人新秧襯鷺嫩柳籠鶯光陰如此不歇何云山額雲垂如人擬睡一雨便醒此時須記花信釀寒身勞乃覺擬覓衣添群飆忽作倚欄看山山亦看我似汝恒心寧有幾箇十方在掌三界無家逢人便出空裏栽花楊花若雪飛舞山庭陽關唱罷之子東征游戲人間胸同渤澥蝦蚌魚龍謾誇能解吳夢初回楚山萬點觸處皆渠何舒何斂湛然常用用本無功為天地父作有無宗山抱鍾聲圓音落落不犯根塵沖霄野鶴名根焰冷觸處熙怡寄言流水莫告人知青敷大地柳破春眉差雲送客倩雨留知毛端收展大千隨寄堪笑酸寒買山而住虛空庫藏既富且久蟻見枯蠅忻為己有月下登高長舒一嘯今古全彰天然非召五里松聲一天晴月或坐或行受用不竭山禽喚友嫩柳吹花春光告別閉戶烹茶心如太虛虛而卻不玅應世間智同天穆少老自移真居不改得路便行塵塵絕待廓爾無求寤寐恒一南北東西無固無必意言究盡活潑無依淡雲初斂新月如眉明暗色空與意俱喪信手拈來十方通暢大千手挈身現毛端心空見息夏熱冬寒生死涅槃鶻侖無縫萬煉千烹始知奉重電光石火意地那容一齊拋下暖日和風逢緣不借豈立玄功毛端剎集煙雨濛濛瓦礫泥團臨時拋出玄玅商量咬人屎橛言前句後體妙失宗千波無跡如日昇空饑來喫飯渴來飲水更問如何開眼見鬼一道靈光無在不在索價撩天阿誰肯賣朕兆未彰用不餘體一月印江萬輪俱啟十方是汝何用他求拈來土塊溈山水牛佛祖所談開遮擒縱是汝家常莫受人哄一切智智無別無同有法可示呼蚓作龍神鼎懶僧拈來便擲是語是禪任人安置雜詠五言獨步萬峰頂閒聽虎喚兒夕陽林下沒回杖月同歸在家疑是客旅舍卻為親湛然而玅用無我亦無人四生皆客住終回不二家毛端天地闊雲散月光華世夢隨時變風雲倏忽過喬松堪傲雪禪客意如何草深蛇性悅空闊鳥難棲欲得門庭鬧無如窠臼宜東風吹萬綠眾卉競舒姿法爾長如是誰知竟不移春深多意氣壯我曲橋溪谷瀑連聲湧迴流濺客衣離欲真出家心忘登佛地三千放淨光只為無情識大千無量物一室斂無餘舉似維摩詰煌煌發令姿茅菴啖翠空霞外群峰立一笑萬緣消菩提只遮是鳥歸斜照裏鳩語綠陰中山氣熏天碧般般絕異同連日雷驅雨青浮欲漲天一聲何處鶴幽谷更堪憐達觀音妙協俗眼自雲泥意夢全消處清飆恰到時群山努力青厭俗圖其形每見山僧面飛來滿我庭斜雨知吾意留客即便晴一山清趣事今夜與君評滿裝一谷雲換得半天雨不第解田憂園蔬賴以注眾鳥隨雲散殘山掛夕陽一聲天際鴈萬綠盡消忙煙翠鍾聲出晴雲冒碧空興來舒一嘯響落數村松幾欲登山去其如足力綿好風知我意吹夢到層顛結茅叢社側客至懶供需酌茗清談外安論我與渠床飛新落葉風掩讀殘書居然三際外聲色意無餘老山披露坐細雨伴泉流狼藉西來意何人解展收神鼎峰頭事千松已吐花不辭為舉似抬手落誰家古佛身無盡亡形化萬般空花兼翳淨神鼎不瞞頇皜月澆詩壁輕風贈遠香對床無語坐千劫坦然降君騎春色來伴我嘗新茗未竟三日談別去良耿耿道友如君少清談不厭過營營人世夢奈此白雲何開軒此靜坐好鳥頻相過天籟忽然生拋書竟乃臥雨滌山愈健雲收月更新十方秋趣味一筆畫分明雜詠六言有無是你兒孫處處腳蹋實地癡人不肯逍遙更去咬他屎屁諸佛由來是汝因何抵死不信渾身佛魔同居薦得也打三頓了無忻厭居懷正是屎坑解脫斫樹不斷根株時至根苗復活我是虛空令尊要他菩提作麼但無一念希求日用應緣不錯霜葉飛如蝴蝶籬邊老菊精神多少時人錯會強來說境說心山抱鐘聲渡水風推松籟來窗一種淨緣誰會黃鶯小語商量十二時歌半夜子消息不通無彼此卻嫌蚤虱姿貪饕摸來依舊空勞指雞鳴丑欲起仍眠如中酒下單失口念彌陀大地山河顛倒走平旦寅管甚真心與妄心世界撮來如米大勸君莫唼老婆唇日出卯山妻秪用一錢討給侍周旋不露顏呼來卻是陳禾稿食時辰佛法塵勞一東薪清磬數聲天地外何須更覓採樵人禺中巳明暗不干誰敢比提將土塊作真金到頭又似張三李日南午堂堂大道無回互沙界塵毛體量同莫來攔我毬門路日昳未休把光陰等閑費他方此土一身中道俗縱橫互為寄晡時申萬壑松風唱主賓咽喉坐斷通車馬不知誰是住菴人日入酉那事茫茫丟卻手遠峰吐月到窗前萬水千山呈拙醜黃昏戌一日安排俱了畢開單脫襪擁禪衣誰能更論波羅密人定亥伸腳長眠觀自在夢裏飽吞王膳珍醒來打破三瓶菜牧牛歌十首尋牛鼻端無竅自優悠瞥起跟尋逐兩頭伊本無依無去住今時及盡始真休見跡愈著尋求愈覺難谿頭停武試詳觀團團蹄跡分明在不必貪程過遠山見牛登高一望草茸茸業畜元來在此中躡足向前穿卻鼻牽來步步怨春風得牛捉獲耕驅南畝上拖犁拽耙幾時休青青兩岸雖無犯猶賴山童緊繫留牧養念念惺惺秪遮頭循欄瀟灑漸和柔養成毛色渾無雜露地安眠不用收騎歸歸來明月印前溪短笛臨風信口吹識得者麼消息事當初孤負我和渠存人打失全牛一事無柴床端坐觜盧都青山綠水仍依舊面目堂堂好丈夫俱忘人牛驀地兩全空好手徒誇遊刃功不到水窮山盡日謾云無異亦無同還源拶到還源本自閑枉將功用著其間聞聲見色無餘地渴飲饑餐倦打眠入廛尊貴功勳俱不住橫身撒手入廛來畜生隊裏翻筋斗處處牢關盡撞開山居雜詠蹋遍諸方古寺苔放憨皮肚任人猜而今老大渾無似支枕松根看月來老松時奏千般韻小澗長分百斛泉隨處看雲和衲睡夢回拈棒打青天相隨一杖無餘物破屋無門不用關秖有清閑無處著石頭坐遍待雲還隔樹數聲樵子韻高歌我詠寒山詩虛空喝彩森羅舞不許時人取次知深山夏日足陰涼小榻鼾眠午夢長睡起經行松樹下數聲啼鳥澗中央濃雲密霧奪群山恍若孤舟汎海瀾四面八方無畔岸不知身在畫圖間茅林隘路石為關來往多遭驀面瞞不動腳跟能到此大千搏取若泥丸精窮徹骨懶頭陀佛法全然不會他對客自來無一語空勞跋涉到煙羅幾年生受貧中樂半世逍遙拙處多一等便宜誰不具衒名弄巧自瞞何佛法全忘懶唱提搬柴煮飯恰臨時相逢多是鐫舟者狼藉春風總不知定起月臨窗白滿吟成風墮葉黃多太平不計功勳事更有何人入佛魔出礦精金是處真瓶盤釵釧總同身一聲鶴唳天初曉不是心兮不是塵青山溢目即如來切忌于斯立聖胎日暮拾柴燒火向不須重撥地爐灰人生隨分即無憂塵世茫茫孰肯休一句了然超百億青山岌峇大江流飯罷閒行事了然全無些子故相牽嶺頭倚杖觀山色淡殺人間虛妄緣畢世精神聲利馳百年光景剎那時堂堂古路無人蹋孤負春風著意吹掃石焚香趺坐久山禽見慣每來依一光映現無伊我使得人間十二時莫謂山居無一事栽瓜種菜忒忙生月沉滄海人難委猶較雞鳴半日程草徑幸無俗子步隔山時有採樵歌一塵不動真安樂纖類纔生早自磨古風愧我不能追豈把身心蹈近時淨行莊嚴非分外珊瑚撐月不吾欺森森萬綠赴茅菴幾片白雲相佳閒清夜數聲谿外鴈為誰飛過碧蘿灣人定月斜鐘斷後夢回霜冷鴈鳴初飄外拽杖穿林走拾得枯枝供地爐人來無口問他禪敲火烹茶得自便翻憶古人機欠密天書三召惹人嫌四山駢綠映柴扉看到黯黯思轉微春鳥也憐遊子苦聲聲叫道不如歸夾菴澗溜高低響繞逕蘚苔厚薄青茶事告成春又去有誰心外見真形懶舉主賓玄要話門前山路亂縱橫堂堂一句超群象南北東西不借功大千經卷一塵包打破何須動一毛壞衲褁山來枕翫空拳捏月就房韜萬山卸翠到禪扉一箇山僧倚杖藜不離六塵元自淨天然畫出數行詩縛箇茅菴雲裏住刀耕火種度時光傳燈說法俱無暇洗腳雙趺月到床山中春夏雨偏多米盡柴生不奈何滴爛虛空猶自可幾乎餓死老禪和物情法爾不能齊得失是非休用提梅華卸白群英發商確春風到鴃啼啼罷流鶯到竹雞牡丹開遍恰晴時天供野菜漫山谷嫩作鮮餚老作虀燈光明滅不成亮坐久昏眠未穩時老鼠成群齊著力天明滿地是糠秕密靄翠封山下路踦𨄅歷盡到菴前道人活計長如是健則鋤雲倦則眠山居糊口一張鋤佛法從他爛且枯栽了王瓜便種豆誰能死水按葫蘆學海奇波空自湧心田異艸可曾刪茅菴斗大堪容膝虛豁全包四面山一幅生成古畫圖春為著色更然都門前舊路俱荒卻差勝牛頭花鳥無羊腸世路競奔趨坦直林泉到者稀穩坐蒲團窗月上此時那許俗人知水響山明諸佛體春來秋去祖師心明明吐露無遮互何事諸人不肯貧澹蕩閒懷冰銕腸去無固必住無方清茶啜罷焚香坐幽鳥一聲天宇長自入山來七八春煙堆衣帽幾身塵不將世夢虛聲譽喚我一生清淨貧禪人訪我入深山陟險梯高途路難莫道山居無款待白雲秋色任君餐委身丘壑高然臥半世生涯月一輪寄與參玄諸上士恩無半點始知恩同門相訪喜盈盈一夜清談到老晨賓主既忘貧徹骨且須住住莫云云百年一覺夢中忙消我山中幾炷香自是塵勞光影促致令閒靜日偏長客來無送亦無迎抵掌清談趣自深擁火喫茶端坐久地爐鼾睡到天明法門替極不堪評種種澆風取次生上下偷安唯苟得風波如此豈應行世亂始知多欲苦年荒方信菜根香從來貧富唯虛習堪嘆人生空自忙直堪行道世非宜來伴青山度歲時分付雨風休作惡明朝我欲探龍谿雨過山光沐眼明滿潭碧水躍然盈春來好處無多子新霽園林鳥一聲細雨洗青山愈好岩花幽艸各知春山僧不是收詩料分付諸人款款吟同居七八箇禪人努力耕鋤不濟貧春種苦蕎雙斗足收來仍舊又三升久居峭谷面如之故友相逢問是誰向道昔人元不在驚呼會得轉身時看雲倚杖峰頭坐聽月攜蒲艸際眠一箇閒身天地外隨緣生受亦蕭然青山目極幾千重獨坐孤峰誰與同秖許流泉知此意一聲聲透碧雲中扶疏新竹舞蹁躚擬住幽禽意未便夏日初長山色健盛塗蒼綠賽青天生平不學雕蟲客日弄之乎者也詞口不關風胡亂語非禪非偈亦非詩山居病懶觀書少獨有輕風知啟吾帶雨攪林鏗碎玉攜雲出嶂展全圖穿雲碧澗長分水駢列青巒不買山回視舊交塵擾裏牽名役利幾時還情生妄自分高下無我何勞論是非沙界即今菴裏物眉毛孤負許多時一夜春回冬未覺猶施冷氣撲人衣暗香梅蕊傳消息幻得東風到綠齊流鶯嫌雨罵東風門外群英牛綠紅雨歇攜笻看瀑布歸來明月在高松北軒高臥有餘適招得群峰到枕看叵耐春風懷妒忌挾來輕雨灑輕寒挈蒲行倦便閑眠舀水烹茶處處便春事摧殘已如許隔山猶唱鷓鴣天四山青映獨憑欄小倦焚香偃臥看好鳥靜觀枝上久恐予鼾睡送高談自補衲衣松樹下幽禽來伴語泠泠佇鍼屢聽忘時久竟日方成箇補釘芳菲寂寞已難堪霧雨何須更剝殘欲斂暑衣猶怯冷快人惟有竹成竿大借湖山供玩具滿天風月未全貧謝君千里來相訪不惜家風盡供申劉千里居士程上觀居士周啟明居士張一生居士王遽公居士張長人居士玄珠居士陳元之黃文鄉李長吉潘用平蔡如龍眾居士捐貲助刻神鼎雲外和尚語錄第十二卷康熙乙巳夏月塔院識
