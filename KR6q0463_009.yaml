body:
  text: 侍者深極編頌古并拈三玄三要第一玄婆婆醜拙不堪言生下孩兒千萬億了無一子見親顏第二玄毗盧頂上掣風顛金剛截斷如泥碎朕兆依稀落有緣第三玄萬里長空月皎然鼓棹高歌漁父樂江村月落正堪眠第一要滿口無言君自道擊碎摩尼雨寶珠放出無毛生鐵鷂第二要信手拈來光晃耀南海波斯擬借看當頭一杓屎和尿第三要活捉生擒無作造橫三豎四絶遮攔魔佛都來厝一窖四料揀奪人不奪境天地一糊餅問道與參玄挑雪來填井奪境不奪人誰來問老僧放伊三頓棒急急奔前程人境兩俱奪死了不得活劍刃解翻身當陽轟一喝人境俱不奪四海樂欣欣鼓腹含哺客誰知堯舜恩四賓主賓中賓頭戴華陽折角巾撞著河陽新婦子相逢撫掌笑欣欣賓中主石火光中急薦取拶折驪龍頷下珠依然不會還飛舉主中賓坐斷乾坤色色新雖然不犯重陽令一盞萸湯也醉人主中主大坐當軒無可與佛祖都來一窟埋管甚十方并三世四喝一喝如同金剛劍英雄殺盡幾人知乾坤一統還真主解綬歸田事事宜一喝渾如獅踞地野干萬獸俱回避不勞牙爪顯全威也落當陽第二義一喝探竿影草時箇中無地可容錐魚龍由此分身墮誰識鵬搏九萬為一喝不作一喝用十方三世絶間種直饒言下得些些辜負平生真骨董狗子無佛性五陵公子樓前過香霧蒙身意氣多寄語玉人親著眼抬眸不奈管絃何黃龍三關等間垂手處火盡不添柴焰星眉上著抖搜不須呆我腳何似驢信步任千差拗折黃龍角何人不到家人人有生緣箇箇被渠穿今朝全舉似江南萬斛船煙塵淨盡信旗通羽檄遙飛氣概雄不是將軍多賈勇太平寰宇絶朦朧婆子燒菴拈云貧居鬧市無人問富在深山有遠親還有不受遮般惡水者麼卓拄杖云山僧罪過衝開碧落松千尺截斷紅塵水一溪松韻水聲交互處大通智勝竟何為黃檗大唐國裏無禪師拈云明修棧道暗度陳倉則不無汝等諸人切忌指鹿為馬山僧今日不惜眉毛下箇注腳去也乃擊拂子云大冶精金應無變色咄天上有星皆拱北人間無水不朝東滿盤傾出如相委何用闍黎飯後鐘大唐國裏無禪師舉似分明更莫疑昨夜嚴風憾林木今朝普請拾枯枝溈山水牯牛拈云要識溈山僧麼以左手拍禪床云遮裏是要識水牯牛麼以右手拍禪床云遮裏是復以兩手拍一下云六月十三熱不相瞞水牯溈山只遮頭及時收放任優悠鼻繩曳斷無蹤影多少行人失路頭韓文公參大顛至擯首座拈云殺人須見血為人須為徹則不無大顛老漢檢點將來合喫山僧手中棒且道何故聻殺人須見血為人須為徹零星喫得嗟來食一撥全傾萬念灰不是大顛能舉令依然門徑長青苔丹霞燒木佛拈云人人盡道院主落卻鬚眉殊不知丹霞打失鼻孔喝一喝云遮裏動著一莖毛雖是善因而招惡果到處逢人驀面欺失便宜是得便宜千重百匝毛端現不許時流取次知東寺心不是佛智不是道長安一片月萬戶搗衣聲秋風吹不盡總是玉關情今日平高下良人罷遠征芭蕉拄杖子拈云一分銀子買一雙草鞋了無奇特只是不許人穿何以故法如是故喝一喝張三眉毛眼上橫李四鼻孔大頭下相逢攜手笑呵呵大風吹起令人怕李渤問歸宗芥子納須彌話萬卷書向何處著芥子須彌頓銷爍八臂那吒撲帝鐘街頭笑倒黃番綽盤山三界無法話細草殷勤迎步緑野華辛苦送清香天然受用輸山叟那許時人造次當高峰無夢無想主人公話至枕子落地因緣霜嚴雪冷客情孤陳陳西風洗道途天曉下床鞋底脫東方日出古今無一椎擊碎摩尼藏相逢何處不逍遙枕頭有甚間巴鼻翻笑從前立處高麻三斤日出天歡喜雲生地起愁晨星分曙色八月定中秋南泉斬貓提起當時血濺天兩堂貓子命難全貍奴跳出乾坤黑一帶晴峰鎖翠煙南泉賣身話拈云王老師一箇身子尚不奈何佛法何曾夢見不是趙州捨件衣服與他遮羞至今賺卻許多人向赤骨律地處作活計喝一喝一具渾身將出賣不容貴賤價分明貪程蹉路諸禪者種種相酬洎沒身喫粥了洗鉢盂話拈拄杖云三春日暖蝶蜂忙黃鶯啼在深深樹還有親見趙州鼻孔者麼喝一喝橫三豎四絶籮籠日落西方又起東若向平常無事會新羅國裏再相逢瑞巖主人公拈云只遮瑞巖老漢早已自瞞了也雖然如是善自知時還會麼喝一喝一生常喚主人公尉斗煎茶銚不同無限清風懸宇宙知音獨許釣魚翁世尊未離兜率已降王宮話拈拄杖喝一喝云向者裏撩起便行非為釋迦老子藏身無地便好向虛空中現大神變攪亂百千世界去也十字街頭臭魚蝦一箇銅錢買他百二十斤不為分外何以故法如是故喝一喝東頭賣貴西頭賤私渡官津誇快便天網恢恢不可逃兩行墨字刊於面夾山與定山無佛有佛因緣生死與諸佛都來一串穿頂門開正眼明月到窗前南泉問黃檗定慧等學明見佛性話拈云只見雷霆施號令豈知星斗煥文章得人一牛還人一馬善放善牧能騎能下草鞋漿水一齊還賺殺東村王大媽趙州勘破臺山婆子拈云遮婆子秪知開眼尿床不知被人換卻鼻孔趙州雖則汗馬功高爭奈泥深三尺還有親見趙州者麼太平本是將軍定不許將軍見太平咄驀指臺山路豈差趙州勘破始無瑕從今休問東西路是處園林是處華南北東西路渺漫一身旅況許誰諳歸來細述途中事多少遊人覓路難伶俐漢直下知歸鬼門關從頭打過不動干戈建太平陽春白雪誰堪和陸亙大夫問南泉肇法師也甚奇怪話拈云飛龍在天利見大人天地同根萬物一體見之不取思之千里幸遇南泉老古錐直指庭花休擬議休擬議拈得眉毛失卻鼻指出庭前花似夢何人肯向箇中休不因此日親提令萬紫千紅逐水流德山托鉢拈云德山父子恰似醉漢罵街誰敢正眼覷著他雖然如是未免醒眼傍觀者哂且道誰是醒眼底人聻乃卓拄杖云丈夫氣宇衝牛斗一踏鴻門兩扇開龍驤虎驟海闊山高巨靈睨之莫措夸父奔以徒勞爭似茅廬間處士三分指掌笑蕭曹傅大士空手把鋤頭話拈云武帝求仙不得仙王喬端坐卻生天暑夜一天星明朝定然熱大小傅大士秪道得一橛興化四方八面來時因緣拈云者則因緣叢林中多見商量道興化若無後語洎合打破蔡州殊不知興化只因後語一生受屈不少何也古廟不須便撈摝水泥深處有嘉魚雨風勢若挾天來潦倒村翁古廟隈買得硃砂畫符賣朗吟飛過鳳凰臺六祖風幡話拈云才離虎穴又入龍潭諸人還會麼拈拄杖云是風動是棒動是心動自是不歸歸便得五湖風月有誰爭大塊噫氣萬竅奴號須彌頂上海闊天高師子尊者罽賓國王斬首話拈云白乳湧天王臂墮地腥氣現存不是不是罽賓師子親相見往往多遭驀面瞞馬上相逢無紙筆憑君傳語報平安傅大士夜夜抱佛眠話拈云有般瞎漢錯會古人意便謂能言能聽的是佛恁麼説話何異認驢鞍橋作阿爺下頷山僧今日不惜眉毛下一句語要與諸人大家覿面同觀良久云覓什麼碗只者語聲是抬眸隔萬千十方全是膽不用老婆禪睦州現成公案至打云掠虛漢因緣拈云韓子盧逐狡兔踰河者三騰山者五兔死于前犬斃于後樵子見之收拾歸來烹與合家受用還有知味者麼卓拄杖喝一喝公案現成放過三十潦倒貧兒便擬端的掀翻海嶽逞全威折角螭龍無處覓無處覓一二三四五六七臨濟無位真人因緣解語非干舌無山不帶雲一聲牛背笛飛鳥又歸林臨濟將入滅示衆與三聖問答因緣拈云臨濟大師當時用的向什麼處去也雖然如是行到水窮處坐看雲起時還有知恩報恩者麼咄應嫌屐齒印蒼苔十扣柴門九不開春色滿園關不住一枝紅杏出牆來見見之時見非是見見猶離見見不能及拈云世尊可謂棒打石人頭嚗嚗論實事雖然如是錯會者多親到者少何以故急水灘頭鳥作窠一上一上又一上一上上到山頭上煙靄平蕪腳底齊萬里青天三十棒九峰勘首座因緣拈云九峰大似送人上樹拔卻梯子若是箇漢必然別有生涯乃豎起竹篦云首座來也是死是活九峰舉問先師意首座焚香坐脫時死活各分成戲具得便宜處失便宜大事未明如喪考妣大事已明亦如喪考妣拈云如今禪和家到處行腳還曾踏著這一片田地也無如或未然退後了打大事未明與已明春來楊柳自青青勸君更進一杯酒西出陽關無故人僧問大隨劫火洞然大千俱壞并舉似投子話拈云者僧腦後喫椎不知痛苦一箇葫蘆東販西販若非二老全身遠害至今喫蛤蜊醬者不少男長為兄女長為姐大冶紅爐可知禮也趙州喫茶去拈云趙州大好一鍾茶只堪供養大衆若是佛法卻未會在何以故太歲當頭羅計照命庚己戌辛不死也病鬼臉神頭萬萬千一杯淡茗苦甘全英雄殺盡無人會珍重秋風八月天萬仞危峰走馬傍觀暗自消魂鶻臭布衫脫卻蕭蕭夜雨青燈僧問巖頭古帆未挂時如何曰後園驢喫草拈云切忌動著速道將來後園驢喫草不用重加料拽轡便騎來穿靴不戴帽古帆挂後如何云小魚吞大魚拈云頭戴須彌腳穿草履還有卸卻天靈蓋者麼喝一喝卸卻天靈蓋小魚吞大魚得錢沽酒飲何處不吾廬婆子請趙州轉經菱角尖尖尖似錐荷葉團團團似鏡彈指圓成八萬門直下一槌俱打正咄鐵牛過窗櫺話踞地擎天秖者頭無端枉自費功猷牢關掣斷鼾眠去南北東西任意遊世尊初生拈云世尊雖然恁麼道諸人不得恁麼會何以故王言如絲雲門秖見錐頭利爭奈錯過如來何咄誰家灶裏火無煙偏你生來便作顛滿肚無明全發盡兒孫不尚老婆禪臘八睹明星悟道拈云上大人丘乙己六年苦行受飢寒靜久還思入鬧藍忽睹明星稱悟道諸人切莫被他瞞世尊升座文殊白椎拈云這兩箇漢前不至村後不至店若人會得與他一緉草鞋瞿曇據令地天寬多口文殊不憚煩椎下縱然分皂白大千何處著羞慚世尊拈花拈云山僧當時若在座下便與喝散大衆掀翻法座何以故免教後代人知將謂兩箇付法説些正法眼藏涅槃妙心實相無相祕密法門且道山僧恁麼道意在於何衣錦尚絅拈華微笑了無長莫把龜毛借斗量擊碎驪珠連夜走天明依舊是刀鎗闥婆奏樂迦葉作舞拈云是真精進是名真法供養如來名華傾國兩相歡長得君王帶笑看解釋春風無限恨沉香亭北倚闌干女子出定拈云精陽不剪霜前竹水墨徒誇海上龍好各與三十拄杖何以故道路各別養家一般黃河徹底渾休將折箸攪貪看鬥雞人天明不覺曉文殊三處過夏拈拄杖云貪看白浪失卻手橈則不無迦葉未審世尊文殊還出得而今圈圚也無卓一下云自出洞來無敵手得饒人處且饒人神頭鬼臉罪難逃鐵鑄肝腸魔膽高冷地看他呈敗闕頭陀何事守漁樵那吒太子析骨還父因緣拈云我要問那吒太子骨肉未還父母時是箇什麼身若向這裏見得徹去喚取廬山與鉢盂共睡骨還父兮肉還母土地金剛打箇賭錦衣公子慣憐春爭似僧堂三下鼓僧問鼓山如何是宗門事山云合取狗口拈云鼓山雖有殺人刀且無活人劍被這僧一問便向蓮華國裏藏身若向這裏剖析分明雖是善因而招惡果合取狗口翻身便走踢倒須彌放開北斗不曾容易舞三臺自有一雙窮相手倩女離魂二女合為一媳婦多少行人失路頭十字街頭吹玉笛淡雲斜日正清秋普化振鐸市地冰霜布網羅鯨吞海盡笑呵呵電光石火分緇素臨濟全機奈汝何船子接夾山拈云船子可謂將成九仞之山不進一簣之土若是當時見他道語帶玄而無路舌頭談而不談更與一橈這裏著得隻眼方能深入虎穴顛倒主賓如或未然縱然悟去也只是箇禿尾蛟龍焉能噴霧如今莫有為夾山作主者麼出來與拄杖子相見一橈奪卻飢兒食放出憨窮皮肚來船子踏翻天地暗水光雲影映崔嵬道吾雲巖大悲千手眼話拈云直饒道得通身是手眼也秪得八成如今現前大衆莫有道得十成句子者麼卓拄杖喝一喝云切忌鑽龜打瓦剎剎塵塵全體露奴兒婢子自殷勤十方吞吐無邊表夜半摸來已涉勳寄與參玄諸上士色空明暗句分明甘贄設粥南泉打破鍋披毛戴角呵呵笑天下風流如此少覿面分明句裏呈鑊鍋打破誰知道陸亙大夫問南泉天地同根話煉就還丹擬獻君洞門未出已消魂抬眸頓覺乾坤別莫道無神卻有神張拙秀才問長沙千佛因緣拈云問一得三聞詩聞禮又聞君子之遠其子也喝一喝云將謂山僧實有與麼説話諸佛間名已切蹉更求端的煞淆訛寒山忘卻來時路拾得相攜返薜蘿溈山三撼門扇話馬面牛頭一串穿嘈嘈雜雜枉鑽研星移斗轉天將曉一曲長歌蓋管絃丹霞與龐居士舉宗眼話拳來腳去著精神究竟和同卻不親月落雲收天宇闊夜深愁殺帳中人趙州到雲居茱萸老老大大住處話破盡家私始出頭癡憨到處覓冤讎等間拶著能翻擲千古徒勞記刻舟趙州在南泉井樓打水因緣趙州起倒意殊深燒尾分明度禹門踏上胡梯三四五舌頭無骨峻崚嶒趙州投子答初生孩子六識因緣初生孩子六無痕急水灘頭打毬子可憐多少弄潮人畢竟還落潮中死青州布衫一歸何處七斤衫驀面拈來盡免寒引得溈山窮長老披毛戴角恣癡憨祕魔擎杈禹門三級浪滔天信手拈來絶意言據虎頭兮收虎尾遊魚無限落前淵臨濟三頓棒好箇真後生無端被人騙打得驢腰疼惡發羅剎面推倒慈氏樓折卻空王殿稽首臨濟大導師得與麼惡形怪臉如何是佛殿裏底如何是佛殿裏底雨過山青更莫疑堪笑鑽龜打瓦客那知禍在著羊皮柏樹子拈出庭前柏樹子活埋今古説禪流勸君打破精靈窟凜凜風行四百州一株庭柏古來今多少行人蹉路程生鐵鑄成無孔笛等間吹過鳳凰城趙州四佛金佛不度爐鼻孔下頭粗木佛不度火直下休疑我泥佛不度水切忌犯唇嘴真佛屋裏坐開口成兩箇收起野狐禪門前山朵朵趙州引得土塹子話趙州布箇漫天網跛鱉盲龜不奈何言下忽開千聖眼毛端殺活辨淆訛趙州云佛之一字吾不喜聞佛之一字吾不喜聞伸手縮手旋乾轉坤門前巨沼連天碧屋後山嵐點翠痕南泉水牯牛三更月到窗話卸卻籠頭脫角馱搖頭擺尾絶安排柳梢殘月天初曉朵朵薔薇帶露開臨濟赤肉團上無位真人話無位真人赤肉團搓圓捏扁剎那間橫尸遍野無蹤影毒氣如今尚未捐臨濟勘院主典座話一箭雙雕隨手落梯山航海謁明君蒼茫不辨寰中敕依舊全身草莽行臨濟升座僧出師便喝僧喝師打紅旗閃灼電光中舉目頭頭煙靄重活計冰銷緇素辨須彌倒卓半空中臨濟兩堂首座齊喝兩堂首座同時喝賓主歷然休再舉不動干戈建太平韓盧徒向枯樁齬南泉平常心話大地平沉解轉身天長地久自由人可憐逐氣尋香者迷悟平常總不親藥山參石頭馬祖契悟因緣脫盡廉纖方自肯東西南北坦然平鐵牛蚊子俱銷爍剩有煙霞繞翠屏黃檗倒地維那扶起話拳來腳去不相饒火葬活埋意更超堪笑持竿量水客徒然今日又明朝臨濟栽松話二十藤條賞有功布帆無恙挂秋風冰消瓦解光明發要顯兒孫意氣雄龐居士不婚不嫁偈家計沉江貧迫甚卻來世上弄姦欺團圞共説無生話賺得光錢買笊籬龐居士問馬祖不與萬法為侶一口吸盡西江水溪橋踏斷便翻身椎門打戶揚家醜誰識驢唇海樣深凌行婆見浮杯并南泉趙州酬唱機緣鴆毛落水魚皆死匝地冰霜布網羅瞬目揚眉三萬里等間誰奈襆頭何百丈野狐話拈云且問大衆這則因緣古今拈提者甚多如今作麼生會良久云大火豈容蠅蚋泊不落不昧好看圈繢得路便行髑髏粉碎不昧不落全機展拓倒臥蘆華市中搖鐸雖然舉似分明五眼不能摸索南泉不是心不是佛話阿翁推車媳婦唱曲古木寒鴉啼鐵蛇當大路驚殺世間人萬千山自青兮水自緑馬祖日面佛月面佛百病一齊發毛繩束太虛微風吹戶牖星月繞簷除即心即佛非心非佛前途猛虎逼後面獰龍追毛端天地闊雲散月光輝南嶽參六祖祖問甚麼物與麼來修證不無染不得層層香霧擁樓臺更云護念皆如是萬臂千頭佛祖胎廬陵米價百兩由來七斤半思量特地忒乖張雲收雨霽江山麗款乃一聲春晝長馬祖三十年不少鹽醬雨前初見花間蕊雨後全無葉底花蜂蝶紛紛過牆去卻疑春色在鄰家大風吹折門前樹園裏長箇大冬瓜八十四人抬不起獅兒一見尾吒髿王老貓兒才斬卻趙州又喚喫杯茶南嶽打車打牛話作鏡磨磚事有由一鞭打碎舊車牛黧奴白牯齊開眼蹴踏奔騰遍九州衣裳剝盡更加刀死馬奔騰氣更豪局蹐牛車誠妄見全身正眼亦兒曹國師三喚侍者三呼三應不相孤卻許南陽起壯圖義絶恩忘無半點趙州東壁挂葫蘆三呼三應意分明洎賺檀即認得聲負汝負吾重點綴僧繇到此筆難伸道明追六祖大庾嶺有省拈云道明上座買鐵得金一場富貴雖然如是若要同師黃梅更須嘔出心肝始得不思善也不思惡驢不是兮馬不成快須擉瞎娘生目始可來分照世燈六祖書偈傳衣鉢拈云祖師恁麼説話佛法何曾夢見為甚得他衣鉢本來一物無騙他鉢盂走佛法何曾夢見些到處逢人開臭口二十七祖不轉經拈云昨有僧問如何是入息不居蘊界山僧道阿呵呵莫做夢如何是出息不涉衆緣亦云阿呵呵莫做夢今日舉似大衆還會麼更聽一頌入息不居蘊出息不涉緣請君莫做夢唱箇哩囉嗹僧問演祖如何是臨濟宗云五逆聞雷五逆聞雷藞藞苴苴同門出入宿世冤家應菴問如何是正法眼藏密菴曰破沙盆生平慣喫渾圇飯百尺竿頭信步行手捏黃金成鐵笛一聲飛絮滿江城南泉三世諸佛不知有狸奴白牯卻知有東村趙五登高第西舍劉三赤體窮兩箇相逢茆廁裏一齊拍掌展家風家風展處誰知有金鼓無聲頑石吼喪盡全機只麼行金毛獅子不如狗南泉趙州玩月話拈云兩父子恰似一對鋸匠送去扯來不差毫髮及至一劃開多少人向遮裏失錢造罪團團孤月映千山幾許行人説易難卻得南泉提正令乾坤打碎掌中看殃屈摩羅救産難話從來賢聖不曾殺當下聞之落葛搭天地毛端展復收春風一陳華容赭僧問南院啐啄同時并見風穴話拈云這僧也只是箇脫白沙彌被風穴拈箇黑豆子換卻眼睛猶自不知縱然見得南院用處也只是無尾蛟龍焉能布雨衆中莫有為此僧作主者麼摸取眼睛看啐啄同時已不堪棒頭有眼不相瞞石火電光千萬里回頭又墮石牢關問龍牙大不能蓋牙云道者合如是黃金無假阿魏無真飢逢王膳不能食病遇醫王豈便惺休莽鹵著精神大地撮來如米粒雪峰老子更通津僧辭歸宗學五味禪話蘭陵美酒鬱金香玉碗盛來琥珀光但使主人能醉客不知何處是他鄉盤山光境俱忘并洞山光境未忘話光境俱忘與未忘糞箕苕帚玩春光落花滿地無人掃燕子銜飛繞畫梁玄沙見虎話拈云弄巧成拙大地絶毫釐平達青雲路透出四重關端的只是虎僧舉雪峰十方世界沙門眼趙州鍬子話十方是眼屙何處趙州寄箇鍬子去團圞不露始周圓依舊茫茫無本據僧問長沙本來人還成佛話拈云好箇岑大蟲説得好道理山僧則不然割茅刈草還須大唐天子始得何故聻但見皇風成一片不知何處是封疆昨夜三更失卻牛天明起來失卻火拈云大小南泉向遮僧手裏納敗乃吐舌云噁三兩黃金七兩銅一齊分付與東風赤條條地塵中臥手握明珠彈野鴻南泉歸宗麻谷同去禮忠國師拈云三箇漢拳踢相應就中一箇猶甚卻被忠國師不費些毫輕輕捉敗且道忠國師尚未見面為甚麼卻被捉敗這裏見得許汝於之字法門有箇入處明舒暗奪弄精魂未到南陽日已昏招手回家情更切滿園春色屬何人銜取一莖草話拈云雲在嶺頭間不徹水流澗底忒忙生同中有異異中有同合水和泥浩蕩風銜取一莖追逐去十方元是舊儀容天上無彌勒天下無彌勒拈云幾箇老漢只解見兔放鷹不能穴中擒虎當時若是山僧見他道天上無彌勒天下無彌勒便云南泉老人來也待他眼目定動便與連棒打出直饒南泉老人也須倒退三千里天上天下無彌勒禪床震動現觀音淨如鼓腹含餔客拄杖縱橫不浪鳴喫油餈話不動口而喫油餈不出門而到莊上堪笑南泉王老師一生賣弄窮伎倆僧問鹽官如何是本身盧舍那話拈云叢林往往商量道與老僧過淨瓶來何等分明這僧懞懂不會所以道古佛過去久矣恁麼説話何殊水母借蝦為眼有問山僧如何是本身盧舍那只向他道這裏不著客作漢若向這裏會去如插翅虎子相似快活快活然雖如是不入驚人浪難逢稱意魚以拂子擊香几楊岐棘栗蓬話楊岐棘栗與金圈日用家常苦又甜吞吐不須舌牙力張公喫酒李公顛楊岐三腳驢三腳驢子弄蹄行凜凜霜風薦毛骨踢踏奔騰遍九州一嘶驚落遼天鶻鳥窠布毛鳥窠拈起布毛吹萬國春光溢草廬多少尋枝摘葉諸西秦東魯枉崎嶇國師無縫塔拈云國師父子俱向代宗手裏納一場敗闕無縫塔子至今猶在還見麼東西無量由旬闊南北恆沙剎土長十世如來埋一冢悠然晝夜放毫光南泉被鬼神覷破話拈云這老漢賴有這一著在天下人不奈伊何雖然如是還見南泉麼擊拂子云黃河清而聖人出黃河清後聖人出不到斯時不得知撒手長安行大道莫於中路討便宜金牛作舞并長慶大光語金牛作舞大生乖長慶相隨上五臺縱使大光能舉令誰知已著眼中埃丈夫自有通天志好惡都來一窖埋藥山一切不為話任運相將只麼行金剛腦後炯雙睛橫吹鐵笛乾坤外聾者能聞跛者伸藥山特牛生兒話東海垂竿情意遠白魚一躍上王舟眉毛踢起無蹤影多少漁人覓路頭三聖令僧問長沙南泉遷化話拈云長沙一條鐵脊梁如須彌山相似水內一半水外一半莫道三聖與這僧拱手歸降即今汝等在此立地聽山僧舉揚也則如百鳥到須彌不覺皆同其色還會麼切忌磕頭撞額比丘怡谷一兩巍然一兩心岸一兩法華菴一兩明心一兩五錢純野一兩黃齋公父子七錢李齋公三錢包成之三錢邵應台二錢同捐資刻神鼎雲外和尚語録第九卷康熙乙巳夏月神鼎塔院識
